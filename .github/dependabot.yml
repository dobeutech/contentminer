version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/New_York
    open-pull-requests-limit: 10
    reviewers:
      - dobeutech
    labels:
      - dependencies
      - automated
    commit-message:
      prefix: "deps:"
      include: scope
    groups:
      patch-minor:
        update-types:
          - patch
          - minor
      major:
        update-types:
          - major

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - ci
